name: Auto Send to Reports (11pm ET)

on:
  schedule:
    # 3:00 AM UTC = 11:00 PM EDT (UTC-4, Apr–Nov)
    # 4:00 AM UTC = 11:00 PM EST (UTC-5, Nov–Mar)
    # Running both so it fires at 11pm year-round
    - cron: '0 3 * * *'   # 11pm EDT (summer)
    - cron: '0 4 * * *'   # 11pm EST (winter)
  workflow_dispatch:       # allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  send-reports:
    runs-on: ubuntu-latest
    # Skip the duplicate run: only proceed at 3am UTC Apr–Oct, 4am UTC Nov–Mar
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run send-reports script
        env:
          TZ: America/New_York
        run: node scripts/send-reports.js

      - name: Commit and push report snapshots
        run: |
          git config user.name  "Auto Reports Bot"
          git config user.email "actions@github.com"
          git add public/data/performance-reports/
          # Only commit if something changed
          if git diff --staged --quiet; then
            echo "No changes to report files — skipping commit."
          else
            git commit -m "🤖 Auto snapshot: $(date +'%b %d, %Y') 11pm ET"
            git push
          fi
