<!DOCTYPE html>
<html>
<head>
<title>Dashboard Test</title>
<script>
const SAVE_ENDPOINT = "https://69cedcf04d902b0b6b932625--resonant-begonia-305283.netlify.app/.netlify/functions/save-dashboard";

async function saveData(){
    try{
        const res = await fetch(SAVE_ENDPOINT,{
            method:"POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({test:"ok"})
        });
        if(!res.ok) throw new Error("Save failed");
        alert("SUCCESS - connection works");
    }catch(e){
        alert("Save failed: " + e.message);
    }
}
</script>
</head>
<body style="background:#111;color:#fff;font-family:sans-serif;text-align:center;padding-top:100px;">
